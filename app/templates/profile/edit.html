{% extends "layout.html" %}
{% block content %}
<section class="form-card">
    <h2>Editar Perfil</h2>
    <form method="post" action="{{ url_for('profile.update') }}">
        <input type="hidden" name="_token" value="{{ csrf_token() }}">

        <label>Nome completo
            <input type="text" name="name" required value="{{ user.name }}">
        </label>

        <label>E-mail (Institucional)
            <input type="email" value="{{ user.email }}" disabled>
        </label>

        <label>Curso
            <input type="text" name="course" value="{{ user.course or '' }}" placeholder="Ex: Engenharia de Computação">
        </label>

        <label>DDD
            <select name="ddd" required>
                {% for d in ddds %}
                    <option value="{{ d }}" {{ 'selected' if d|string == ddd else '' }}>0{{ d }}</option>
                {% endfor %}
            </select>
        </label>

        <label>Telefone
            <input type="text"
                name="phone"
                id="phone-input"
                placeholder="99999-9999"
                maxlength="10"
                oninput="formatPhone(this)"
                value="{{ phone }}">
        </label>

        <button class="btn" type="submit">Salvar Alterações</button>
        <a href="{{ url_for('home.index') }}" class="btn ghost">Voltar</a>
    </form>
</section>
{% endblock %}
