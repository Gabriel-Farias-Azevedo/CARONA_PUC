{% extends "layout.html" %}
{% block content %}
<section class="form-card">
    <h2>Criar conta</h2>
    <form method="post" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="_token" value="{{ csrf_token() }}">
        <label>Nome completo
            <input type="text" name="name" required value="{{ old.get('name', '') }}">
        </label>
        <label>Curso (Opcional)
            <input type="text" name="course" value="{{ old.get('course', '') }}" placeholder="Ex: Engenharia de Software">
        </label>
        <label>DDD (Opcional)
            <select name="ddd">
                <option value="">Selecione...</option>
                {% for d in ddds %}
                    <option value="{{ d }}">0{{ d }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Telefone (Opcional)
            <input type="text" name="phone" id="phone-input" placeholder="99999-9999" maxlength="10" oninput="formatPhone(this)">
        </label>
        <label>E-mail
            <input type="email" name="email" required value="{{ old.get('email', '') }}" placeholder="seuemail@aluno.puc-rio.br">
        </label>
        <label>Senha (mínimo 6 caracteres)
            <input type="password" name="password" required minlength="6">
        </label>
        <button class="btn" type="submit">Criar conta</button>
    </form>

</section>
{% endblock %}
